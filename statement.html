<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERRIHO PORTAL - STATEMENT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* Dito i-paste ang lahat ng <style> mo mula sa original code */
        :root { --primary-green: #27ae60; --dark-black: #1a1a1a; --danger-red: #e74c3c; --soft-gray: #f8f9fa; }
        body { font-family: 'Inter', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; color: var(--dark-black); line-height: 1.6; }
        .card { background: white; border-radius: 28px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); max-width: 550px; margin: auto; border-top: 8px solid var(--primary-green); position: relative; }
        .hero-section { background: linear-gradient(135deg, #1a1a1a, #333); color: white; border-radius: 20px; padding: 25px; text-align: center; margin-bottom: 25px; }
        .amount-hero { font-size: 42px; font-weight: 800; margin: 5px 0; color: #fff; }
        .due-label { font-size: 11px; font-weight: 600; color: #aaa; text-transform: uppercase; }
        .bill-row { border-bottom: 1px solid #f0f0f0; padding: 15px 0; cursor: pointer; }
        .details-pane { display: none; background: var(--soft-gray); border-radius: 15px; padding: 15px; margin-top: 10px; font-size: 13px; }
        .bill-row.active .details-pane { display: block; }
        .status { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .status-paid { background: #e6f9ed; color: #27ae60; }
        .status-overdue { background: #fff1f0; color: #e74c3c; }
        .btn-pay-animated { width:100%; padding:20px; background:#27ae60; color:white; border:none; border-radius:18px; font-weight:800; font-size:18px; cursor:pointer; }
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:none; justify-content:center; align-items:center; z-index:1000; }
        .modal-box { background:white; border-radius:28px; padding:25px; text-align:center; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="welcomePortalModal" class="modal-overlay">
    <div class="modal-box">
        <div style="font-size: 50px;">👋</div>
        <h2 id="modalName">Hello!</h2>
        <p style="font-size: 13px; color: #666;">Welcome to your new ERRIHO Portal! We’ve upgraded our system for you.</p>
        <button onclick="closeWelcomeModal()" style="width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 12px; font-weight: 800;">GOT IT!</button>
    </div>
</div>

<div class="card" id="mainCard" style="display:none;">
    <div style="text-align: right; margin-bottom: 10px;">
        <a href="logout.html" style="text-decoration: none; font-size: 11px; font-weight: 800; color: #e74c3c; background: #fff1f0; padding: 8px 15px; border-radius: 10px; border: 1px solid #ffccc7;">Log Out ➔</a>
    </div>

    <div style="text-align: center; margin-bottom: 30px; border-bottom: 1px solid #f0f0f0; padding-bottom: 20px;">
        <img src="images/test.png" style="height: 100px;">
        <div style="font-size: 10px; font-weight: 800; color: #aaa; letter-spacing: 2px;">ERRIHO PORTAL</div>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 25px;">
        <div>
            <h2 id="userName" style="margin: 0; font-size: 22px; font-weight: 800;">---</h2>
            <div style="margin-top: 8px;"><span id="accRef" style="font-family: monospace; font-weight: 700; color: #27ae60; background: #e8f5e9; padding: 2px 8px; border-radius: 5px;">---</span></div>
        </div>
        <div style="border: 1.5px solid #eee; border-radius: 18px; padding: 12px; text-align: center;">
            <div style="font-size: 9px; font-weight: 800; color: #888;">Credit Rating</div>
            <div id="creditRating" style="font-size: 28px; font-weight: 800;">0%</div>
        </div>
    </div>

    <div class="hero-section" id="heroSec">
        <p class="due-label" id="heroLabel">Loading...</p>
        <div class="amount-hero" id="heroAmount">₱0.00</div>
    </div>

    <div style="background: white; border-radius: 20px; border: 1px solid #eee; padding: 20px; margin-bottom: 25px;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
            <span style="font-size: 13px;">Total Outstanding Balance</span>
            <span id="balance" style="font-size: 20px; font-weight: 800; color: #e74c3c;">₱0.00</span>
        </div>
    </div>

    <a id="payBtn" href="#" target="_blank" style="text-decoration:none;">
        <button class="btn-pay-animated">💸 PROCEED TO PAYMENT</button>
    </a>

    <div class="schedule-container" id="scheduleList" style="margin-top: 25px;">
        <span style="font-size: 11px; font-weight: 800; color: #999;">REPAYMENT SCHEDULE</span>
        </div>
</div>

<script>
    // 1. Check Security
    const userData = JSON.parse(localStorage.getItem('erriho_user'));
    if (!userData) { window.location.href = 'index.html'; }

    window.onload = () => {
        document.getElementById('mainCard').style.display = 'block';
        if (!localStorage.getItem('hasSeenWelcome_v2')) {
            document.getElementById('welcomePortalModal').style.display = 'flex';
        }
        renderData();
    };

    function renderData() {
        document.getElementById('userName').innerText = userData.name.toUpperCase();
        document.getElementById('accRef').innerText = userData.accRef;
        document.getElementById('balance').innerText = "₱" + parseFloat(userData.balance).toLocaleString();
        document.getElementById('modalName').innerText = "Hello, " + userData.name.split(' ')[0] + "!";
        document.getElementById('payBtn').href = userData.payLink;
        
        // Hero Section Logic
        let overdueTotal = 0;
        let overdueNames = [];
        let nextBill = null;

        userData.schedule.forEach((item, index) => {
            if (item.st.toUpperCase() === 'OVERDUE') {
                overdueTotal += parseFloat(item.total);
                overdueNames.push("Bill " + (index + 1));
            } else if (item.st.toUpperCase() === 'DUE' && !nextBill) {
                nextBill = item;
            }
        });

        const heroLabel = document.getElementById('heroLabel');
        const heroAmount = document.getElementById('heroAmount');
        if (overdueTotal > 0) {
            heroLabel.innerText = "⚠️ ACCOUNT OVERDUE";
            heroLabel.style.color = "#ff7675";
            heroAmount.innerText = "₱" + overdueTotal.toLocaleString();
        } else if (nextBill) {
            heroLabel.innerText = "Next Due Date: " + nextBill.mo;
            heroAmount.innerText = "₱" + parseFloat(nextBill.total).toLocaleString();
        }

        // Repayment Schedule Rendering
        const list = document.getElementById('scheduleList');
        userData.schedule.forEach((item, index) => {
            const st = item.st.toUpperCase();
            const stClass = st === 'PAID' ? 'status-paid' : (st === 'OVERDUE' ? 'status-overdue' : '');
            
            const html = `
                <div class="bill-row" onclick="this.classList.toggle('active')">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <div style="font-weight:700;">${item.mo}</div>
                            <div style="font-size:11px; color:#888;">Bill No. ${index + 1} <span style="animation: blink 1.5s infinite; color:#27ae60;">• Tap</span></div>
                        </div>
                        <div style="text-align:right;">
                            <div style="font-weight:800;">₱${parseFloat(item.total).toLocaleString()}</div>
                            <span class="status ${stClass}">${st}</span>
                        </div>
                    </div>
                    <div class="details-pane">
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                            <div><small>LATE PENALTY</small><br>₱${item.late}</div>
                            <div><small>REF</small><br>${item.ref || '---'}</div>
                        </div>
                    </div>
                </div>
            `;
            list.innerHTML += html;
        });
    }

    function closeWelcomeModal() {
        document.getElementById('welcomePortalModal').style.display = 'none';
        localStorage.setItem('hasSeenWelcome_v2', 'true');
    }
</script>
</body>
</html>
