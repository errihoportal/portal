<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERRIHO Story - Experience the Future</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --primary: #27ae60; --dark: #1a1a1a; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Helvetica Neue', Arial, sans-serif; overflow: hidden; }

        /* Story Container */
        .story-wrapper {
            width: 100%; max-width: 450px; height: 100vh; margin: 0 auto;
            background: linear-gradient(180deg, #000 0%, #1a1a1a 100%);
            position: relative; display: flex; flex-direction: column; color: white;
        }

        /* Overlay Start Button */
        #overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 100; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }

        .start-btn {
            background: var(--primary); color: white; border: none;
            padding: 20px 40px; border-radius: 50px; font-weight: 800;
            font-size: 18px; cursor: pointer; box-shadow: 0 0 20px rgba(39, 174, 96, 0.5);
        }

        /* Slides */
        .slide {
            position: absolute; inset: 0; display: none;
            flex-direction: column; justify-content: center;
            align-items: center; padding: 40px; text-align: center;
        }
        .slide.active { display: flex; }

        /* Progress Bars */
        .progress-container {
            display: flex; padding: 15px 10px; gap: 5px; z-index: 50;
        }
        .segment { height: 3px; background: rgba(255,255,255,0.2); flex: 1; border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; }

        /* Content Styling */
        .logo-box { width: 80px; height: 80px; background: white; border-radius: 20px; padding: 10px; margin-bottom: 30px; }
        .logo-box img { width: 100%; height: 100%; object-fit: contain; }
        h1 { font-size: 36px; font-weight: 900; margin-bottom: 20px; line-height: 1.1; }
        p { font-size: 18px; color: #ccc; line-height: 1.6; }
        .highlight { color: var(--primary); }

        /* Swipe Up */
        .footer { position: absolute; bottom: 40px; width: 100%; text-align: center; opacity: 0; transition: 0.5s; }
        .footer.show { opacity: 1; }
        .cta-btn {
            background: var(--primary); color: white; text-decoration: none;
            padding: 15px 40px; border-radius: 50px; font-weight: 800;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div id="overlay">
        <div class="logo-box animate__animated animate__pulse animate__infinite">
            <img src="https://errihoportal.github.io/portal/images/logo.png" alt="ERRIHO">
        </div>
        <h2 style="margin-bottom: 30px;">Your Statement is Ready</h2>
        <button class="start-btn" onclick="startStory()">TAP TO VIEW STORY</button>
    </div>

    <div class="story-wrapper">
        <div class="progress-container">
            <div class="segment"><div class="progress-fill" id="fill0"></div></div>
            <div class="segment"><div class="progress-fill" id="fill1"></div></div>
            <div class="segment"><div class="progress-fill" id="fill2"></div></div>
        </div>

        <div class="slide active" id="slide0">
            <div class="animate__animated animate__zoomIn">
                <h1 class="highlight">Hello!</h1>
                <p>We've been working on something <br><strong>special</strong> just for you.</p>
            </div>
        </div>

        <div class="slide" id="slide1">
            <div class="animate__animated animate__fadeInRight">
                <h1>The New <br>ERRIHO Portal</h1>
                <p>Track your balance, payments, and credit score in <span class="highlight">real-time.</span></p>
            </div>
        </div>

        <div class="slide" id="slide2">
            <div class="animate__animated animate__backInUp">
                <h1>Ready to <br>Explore?</h1>
                <p>Your latest Statement of Account <br>is now waiting for you.</p>
            </div>
        </div>

        <div class="footer" id="storyFooter">
            <div style="margin-bottom: 10px; font-size: 20px; animation: bounce 2s infinite;">^</div>
            <a href="https://errihoportal.github.io/portal" class="cta-btn">LOG IN NOW</a>
        </div>
    </div>

    <script>
        let currentSlide = 0;
        const totalSlides = 3;
        const slideDuration = 4000; // 4 seconds per slide

        function startStory() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('bgMusic').play();
            runSlide();
        }

        function runSlide() {
            if (currentSlide >= totalSlides) {
                document.getElementById('storyFooter').classList.add('show');
                return;
            }

            // Reset all slides
            for (let i = 0; i < totalSlides; i++) {
                document.getElementById('slide' + i).classList.remove('active');
            }

            // Show current slide
            const activeSlide = document.getElementById('slide' + currentSlide);
            activeSlide.classList.add('active');

            // Animate progress bar
            const fill = document.getElementById('fill' + currentSlide);
            let width = 0;
            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    currentSlide++;
                    runSlide();
                } else {
                    width += 1; // Control speed
                    fill.style.width = width + '%';
                }
            }, slideDuration / 100);
        }
    </script>

</body>
</html>
