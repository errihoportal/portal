<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERRIHO | Update Passcode</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-green: #27ae60;
            --light-green: #e8f5e9;
            --dark-text: #1a1a1a;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body { 
            background: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
        }

        .update-card { 
            background: #ffffff; 
            padding: 30px 25px; 
            border-radius: 28px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.08); 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
        }

        .logo-section { margin-bottom: 20px; }
        .logo-section img { height: 60px; margin-bottom: 10px; }

        .brand-title { 
            font-size: 18px; 
            font-weight: 800; 
            color: var(--primary-green); 
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .instructions { 
            font-size: 13px; 
            color: #666; 
            line-height: 1.5; 
            margin-bottom: 25px; 
            background: var(--light-green);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #d1f2dc;
        }

        .input-group { margin-bottom: 18px; text-align: left; }
        
        label { 
            font-size: 11px; 
            font-weight: 800; 
            color: #888; 
            margin-left: 5px; 
            text-transform: uppercase;
        }

        input { 
            width: 100%; 
            padding: 14px; 
            margin-top: 6px; 
            border: 2px solid #eee; 
            border-radius: 14px; 
            font-size: 15px; 
            outline: none; 
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary-green); background: #fafafa; }

        .otp-section { 
            display: none; 
            background: #fff8e1; 
            padding: 15px; 
            border-radius: 15px; 
            margin-top: 10px; 
        }

        button { 
            width: 100%; 
            padding: 16px; 
            background: var(--primary-green); 
            color: white; 
            border: none; 
            border-radius: 16px; 
            font-size: 16px; 
            font-weight: 700; 
            cursor: pointer; 
            margin-top: 10px; 
            box-shadow: 0 4px 12px rgba(39, 174, 96, 0.2);
        }

        .btn-back {
            display: inline-block;
            margin-top: 20px;
            font-size: 13px;
            color: #888;
            text-decoration: none;
            font-weight: 600;
        }

        #status-msg { 
            display: none; 
            margin-top: 15px; 
            font-size: 14px; 
            color: var(--primary-green); 
            font-weight: bold; 
        }
    </style>
</head>
<body>

<div class="update-card">
    <div class="logo-section">
        <img src="images/logo.png" alt="Logo">
        <div class="brand-title">ACCOUNT UPDATE</div>
    </div>

    <p class="instructions">
        <i class="fas fa-shield-alt"></i><br>
        To protect your account, please verify your details. We will send an <strong>OTP</strong> to your registered email.
    </p>

    <div id="step1">
        <div class="input-group">
            <label><i class="fas fa-user"></i> Full Name</label>
            <input type="text" id="fullname" placeholder="Full Name (e.g. Juan Dela Cruz)">
        </div>
        <div class="input-group">
            <label><i class="fas fa-envelope"></i> Registered Email</label>
            <input type="email" id="email" placeholder="example@gmail.com">
        </div>
        <button onclick="requestOTP()">VERIFY & SEND OTP</button>
    </div>

    <div id="step2" style="display:none;">
    <p style="font-size: 12px; color: #856404; background: #fff3cd; padding: 12px; border-radius: 12px; border: 1px solid #ffeeba; margin-bottom: 20px; line-height: 1.4;">
        <i class="fas fa-envelope-open-text"></i><br>
        Check your email <b>info.erriho@gmail.com</b> for the 6-digit OTP. 
        <span style="display:block; margin-top: 5px; font-size: 11px; color: #a07e1a;">
            *If not found, please check your <b>Spam/Junk</b> folder.
        </span>
    </p>

    <div class="otp-section" id="otp-input-area" style="display:block; margin-bottom:20px;">
        <label style="color: #b58105;">ENTER 6-DIGIT OTP</label>
        <input type="text" id="otp-code" placeholder="000000" maxlength="6" style="text-align:center; letter-spacing: 5px; font-weight:bold; border-color: #ffe082;">
    </div>

    <div class="input-group">
        <label>New Username</label>
        <input type="text" id="newuser" placeholder="Small letters, no spaces">
    </div>
    <div class="input-group">
        <label>New Passcode</label>
        <input type="password" id="newpass" placeholder="6-digit passcode" maxlength="6">
    </div>
    <button onclick="verifyAndSubmit()">CONFIRM UPDATE</button>
</div>

    <div id="status-msg">Verifying details...</div>
    
    <a href="index.html" class="btn-back">← Back to Login</a>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxu7hJeghA8ZEroQisS7V-7VxG8lFojZiz0WP8WHDkA5mugOaEzaYURBAN4gyB2f81Z_Q/exec"; 
    let userRow = null;

    async function requestOTP() {
        const name = document.getElementById('fullname').value;
        const email = document.getElementById('email').value;
        const statusMsg = document.getElementById('status-msg');

        if(!name || !email) {
            alert("Please enter your name and registered email.");
            return;
        }

        statusMsg.innerText = "🔍 Verifying details and sending OTP...";
        statusMsg.style.display = "block";

        try {
            const response = await fetch(`${SCRIPT_URL}?action=requestOTP&name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}`);
            const result = await response.json();

            if (result.status === "success") {
                userRow = result.row;
                statusMsg.style.color = "#27ae60";
                statusMsg.innerText = "✅ OTP sent to your registered email!";
                
                setTimeout(() => {
                    document.getElementById('step1').style.display = 'none';
                    document.getElementById('step2').style.display = 'block';
                    statusMsg.style.display = "none";
                }, 1500);
            } else {
                alert("❌ Error: " + result.message);
                statusMsg.style.display = "none";
            }
        } catch (error) {
            console.error(error);
            alert("Connection error. Please check your internet.");
            statusMsg.style.display = "none";
        }
    }

    async function verifyAndSubmit() {
        const otp = document.getElementById('otp-code').value;
        const newUser = document.getElementById('newuser').value;
        const newPass = document.getElementById('newpass').value;
        const statusMsg = document.getElementById('status-msg');

        if(!otp || !newUser || !newPass) {
            alert("Please fill up all fields.");
            return;
        }

        statusMsg.style.color = "#27ae60";
        statusMsg.innerText = "⚙️ Updating your account... please wait.";
        statusMsg.style.display = "block";

        try {
            const response = await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({
                    action: "updateAccount",
                    row: userRow,
                    otp: otp,
                    new_user: newUser,
                    new_pass: newPass
                })
            });

            const result = await response.json();

            if (result.status === "success") {
                alert("🎉 ACCOUNT UPDATED!\n\nYour username and passcode have been changed successfully.");
                
                statusMsg.innerText = "🎉 Account updated successfully! Redirecting...";
                setTimeout(() => {
                    // BINAGO: Redirect sa index.html
                    window.location.href = "index.html"; 
                }, 1000);
            } else {
                alert("❌ Error: " + result.message);
                statusMsg.style.display = "none";
            }
        } catch (error) {
            console.error(error);
            alert("Failed to update account.");
            statusMsg.style.display = "none";
        }
    }
</script>
</body>
</html>
