<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Logging out...</title>
</head>
<body style="background: #f0f2f5; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh;">
    
    <div style="text-align: center; color: #888;">
        <p>Securing your account...</p>
    </div>

    <script>
        // 1. Burahin ang user data
        localStorage.removeItem('erriho_user');
        
        // OPTIONAL: Kung gusto mong pati yung "Welcome" modal ay lumitaw ulit sa susunod:
        // localStorage.clear(); 

        // 2. Double-Lock: Burahin ang history forward/backward entries
        window.history.pushState(null, null, window.location.href);
        window.onpopstate = function () {
            window.history.go(1);
        };

        // 3. I-redirect sa login page
        setTimeout(() => {
            window.location.replace("index.html");
        }, 500); // Konting delay lang para siguradong tapos ang pag-clear
    </script>
</body>
</html>
