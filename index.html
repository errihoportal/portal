<?php
session_start();

// Kapag naka-login na, diretso na sa statement.php
if (isset($_SESSION['user_data'])) {
    header("Location: statement.php");
    exit();
}

$error_login = false;

if (isset($_POST['login'])) {
    $acc = trim($_POST['acc']); 
    $pass = trim($_POST['pass']); 
    
    $baseUrl = "https://script.google.com/macros/s/AKfycbxu7hJeghA8ZEroQisS7V-7VxG8lFojZiz0WP8WHDkA5mugOaEzaYURBAN4gyB2f81Z_Q/exec";
    $url = $baseUrl . "?acc=" . urlencode($acc) . "&pass=" . urlencode($pass);

    $ch = curl_init();
    curl_setopt($ch, CURLOPT_URL, $url);
    curl_setopt($ch, CURLOPT_RETURNTRANSFER, 1);
    curl_setopt($ch, CURLOPT_FOLLOWLOCATION, true); 
    curl_setopt($ch, CURLOPT_SSL_VERIFYPEER, false);
    $response = curl_exec($ch);
    curl_close($ch);
    
    $data = json_decode($response, true);

    if ($data && isset($data['status']) && $data['status'] !== 'error') {
        $_SESSION['user_data'] = $data; // I-save ang data para sa statement.php
        header("Location: statement.php");
        exit();
    } else {
        $error_login = true;
    }
}
