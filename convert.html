<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convert to Installment - ERRIHO</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 15px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 20px; }
        
        .info-card { background: #e8f4fd; padding: 15px; border-left: 5px solid #3498db; border-radius: 5px; margin-bottom: 20px; }
        .label { font-weight: bold; font-size: 14px; color: #7f8c8d; }
        .value { font-size: 18px; font-weight: bold; display: block; margin-top: 5px; }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }

        .breakdown-box { background: #fff9e6; border: 1px solid #ffeaa7; border-radius: 8px; padding: 15px; margin-top: 20px; }
        .breakdown-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .total-row { display: flex; justify-content: space-between; padding: 12px 0; font-weight: bold; font-size: 18px; color: #d35400; }

        .btn-convert { width: 100%; background: #27ae60; color: white; border: none; padding: 15px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn-convert:hover { background: #219150; }
        .back-link { display: block; text-align: center; margin-top: 15px; text-decoration: none; color: #7f8c8d; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Convert to Installment</h2>

    <div class="info-card">
        <span class="label">Total Unpaid Balance</span>
        <span class="value" id="displayBalance">₱ 0.00</span>
    </div>

    <div class="form-group">
        <label>Select Installment Terms (Months)</label>
        <select id="termsSelect" onchange="calculateInstallment()">
            <option value="1">1 Month</option>
            <option value="2">2 Months</option>
            <option value="3">3 Months</option>
            <option value="6">6 Months</option>
            <option value="9">9 Months</option>
            <option value="12">12 Months</option>
        </select>
    </div>

    <div class="breakdown-box" id="breakdownArea">
        <h4 style="margin-top:0;">Computation Breakdown</h4>
        <div class="breakdown-row">
            <span>Processing Fee</span>
            <span id="procFee">₱ 300.00</span>
        </div>
        <div class="breakdown-row">
            <span>Monthly Interest (5%)</span>
            <span id="monthlyInt">₱ 0.00</span>
        </div>
        <div class="breakdown-row">
            <span>Total Amount to Pay</span>
            <span id="totalWithInt">₱ 0.00</span>
        </div>
        <div class="total-row">
            <span>Monthly Installment</span>
            <span id="monthlyAmort">₱ 0.00</span>
        </div>
    </div>

    <button class="btn-convert" onclick="processConversion()">Confirm Conversion</button>
    <a href="index.html" class="back-link">❮ Back to Dashboard</a>
</div>

<script>
    const rawData = localStorage.getItem('erriho_user');
    const data = JSON.parse(rawData);
    // Siguraduhing tama ang baseUrl mo (same sa promissory)
    const baseUrl = "https://script.google.com/macros/s/AKfycbxu7hJeghA8ZEroQisS7V-7VxG8lFojZiz0WP8WHDkA5mugOaEzaYURBAN4gyB2f81Z_Q/exec";

    const PROCESSING_FEE = 300.00;
    const MONTHLY_INTEREST_RATE = 0.05;
    let totalPrincipal = 0;

    window.onload = function() {
        if (!data) {
            alert("No user data found.");
            window.location.href = "index.html";
            return;
        }
        calculateTotalUnpaid();
        calculateInstallment();
    };

    function calculateTotalUnpaid() {
        // February 12 Balance (Hardcoded based sa setup mo)
        let total = 2675.27; 
        if (data.schedule) {
            data.schedule.forEach(bill => {
                if (bill.st !== "PAID" && bill.st !== "Paid") {
                    let amt = parseFloat(bill.p_amt.toString().replace(/[₱,]/g, '')) || 0;
                    total += amt;
                }
            });
        }
        totalPrincipal = total;
        document.getElementById('displayBalance').innerText = "₱ " + total.toLocaleString('en-US', {minimumFractionDigits: 2});
    }

    function calculateInstallment() {
        const terms = parseInt(document.getElementById('termsSelect').value);
        const totalInterest = (totalPrincipal * MONTHLY_INTEREST_RATE) * terms;
        const finalTotal = totalPrincipal + PROCESSING_FEE + totalInterest;
        const monthlyAmortization = finalTotal / terms;

        document.getElementById('monthlyInt').innerText = "₱ " + (totalPrincipal * MONTHLY_INTEREST_RATE).toLocaleString('en-US', {minimumFractionDigits: 2}) + " /mo";
        document.getElementById('totalWithInt').innerText = "₱ " + finalTotal.toLocaleString('en-US', {minimumFractionDigits: 2});
        document.getElementById('monthlyAmort').innerText = "₱ " + monthlyAmortization.toLocaleString('en-US', {minimumFractionDigits: 2});
    }

    async function processConversion() {
        const btn = document.querySelector('.btn-convert');
        const terms = document.getElementById('termsSelect').value;
        const monthly = document.getElementById('monthlyAmort').innerText;

        if (!confirm(`Confirm conversion to ${terms} months installment?`)) return;

        btn.innerText = "⏳ Processing Request...";
        btn.disabled = true;

        try {
            // Gumawa tayo ng PDF snapshot ng breakdown area gamit ang html2canvas
            const breakdownArea = document.getElementById('breakdownArea');
            const canvas = await html2canvas(breakdownArea, { scale: 2 });
            const imgData = canvas.toDataURL("image/jpeg", 0.8);

            // Payload na ipapadala sa Apps Script
            const payload = {
                action: "conversion", // Binago para ma-filter sa Sheets/Drive
                image: imgData, 
                filename: `CONVERT_${data.accRef}_${data.name}.jpg`,
                email: data.email,
                name: data.name,
                details: {
                    principal: totalPrincipal,
                    terms: terms,
                    monthly: monthly,
                    processingFee: PROCESSING_FEE
                }
            };

            await fetch(baseUrl, { 
                method: "POST", 
                mode: "no-cors", 
                body: JSON.stringify(payload) 
            });

            alert("✅ CONVERSION REQUEST SUBMITTED!");
            window.location.href = "statement.html";

        } catch (err) {
            console.error(err);
            alert("❌ Error: " + err.message);
            btn.innerText = "Confirm Conversion";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
