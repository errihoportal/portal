<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERRIHO Loan Application</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- Core CSS --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* --- Main Container (Responsive) --- */
        .app-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 600px; /* Sukat para sa Desktop */
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        /* --- Branding --- */
        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        /* Dito mo ilalagay ang link ng logo image mo */
        .logo-img {
            max-width: 150px;
            height: auto;
            margin-bottom: 10px;
        }

        .main-title {
            color: #008148; /* Itong berde ay kinuha sa logo */
            font-weight: 700;
            font-size: 1.8rem;
            text-transform: uppercase;
        }

        .sub-title {
            color: #333;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 1px;
            margin-top: -5px;
        }

        /* --- Form Elements --- */
        form {
            display: grid;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
            font-size: 0.9rem;
        }

        input, select {
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            transition: border-color 0.2s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #008148;
            box-shadow: 0 0 0 3px rgba(0, 129, 72, 0.1);
        }

        /* --- Dynamic Section Styling --- */
        .dynamic-fields {
            margin-top: -10px;
        }

        .express-badge {
            background-color: #e6fdf1;
            border: 2px solid #008148;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .premier-badge {
            background-color: #fff9e6;
            border: 2px solid #f2c94c;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .icon {
            font-size: 1.4rem;
        }

        .badge-text {
            font-size: 0.85rem;
            font-weight: 600;
            color: #333;
        }

        .hidden {
            display: none !important;
        }

        /* --- Submit Button --- */
        .submit-btn {
            background-color: #000000;
            color: #ffffff;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background-color 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .submit-btn:hover {
            background-color: #333;
        }

        /* --- Response Message --- */
        #responseMessage {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: 600;
        }
        #responseMessage.success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        #responseMessage.error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        /* --- Media Queries (Mobile First) --- */
        @media (max-width: 600px) {
            .app-container {
                padding: 30px 20px;
                border-radius: 0; /* Full width sa mobile */
            }
            .main-title {
                font-size: 1.5rem;
            }
            input, select, .submit-btn {
                font-size: 0.9rem;
                padding: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="logo-section">
            <img src="your_logo_url_here.png" alt="ERRIHO Logo" class="logo-img">
            <h1 class="main-title">ERRIHO</h1>
            <h2 class="sub-title">PERSONAL FINANCE</h2>
        </div>

        <form id="loanApplicationForm">
            <div class="form-group">
                <label for="fullName">Pangalan (Full Name):</label>
                <input type="text" id="fullName" name="fullName" placeholder="Hal: Juan Dela Cruz" required>
            </div>

            <div class="form-group">
                <label for="loanType">Anong loan ang kukunin mo?</label>
                <select id="loanType" name="loanType">
                    <option value="QuickCash">ErriHo QuickCash (1 Month)</option>
                    <option value="Personal Loan">ErriHo Personal Loan (Up to 12 Months)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="appType">Paano ka mag-a-apply?</label>
                <select id="appType" name="appType" onchange="toggleFormSections()">
                    <option value="Express Apply">Express Apply (Need Code)</option>
                    <option value="Premier Apply">Premier Apply (Standard)</option>
                </select>
            </div>

            <div class="dynamic-fields">
                <div id="expressSection">
                    <div class="express-badge">
                        <span class="icon">⚡</span>
                        <span class="badge-text">Wala na itong Income Documents. Siguraduhin lang na tama ang Offer Code mo.</span>
                    </div>
                    <div class="form-group">
                        <label for="offerCode">Ilagay ang iyong Offer Code:</label>
                        <input type="text" id="offerCode" name="offerCode" placeholder="Enter your 6-digit code">
                    </div>
                </div>

                <div id="premierSection" class="hidden">
                    <div class="premier-badge">
                        <span class="icon">📋</span>
                        <span class="badge-text">Dahil wala kang Offer Code, hihingan ka namin ng dagdag na dokumento para ma-verify ang iyong kakayahang magbayad.</span>
                    </div>
                    <div class="form-group">
                        <label>Income Level (Kalahatang Kita sa isang buwan):</label>
                        <input type="text" name="incomeLevel" placeholder="Hal: PHP 25,000">
                    </div>
                    <div class="form-group">
                        <label>Paano ka namin mabe-verify? (Link/Note):</label>
                        <input type="text" name="verificationNote" placeholder="Hal: Payslip uploaded via drive link / I'm a permanent employee">
                    </div>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Submit Application</button>
        </div>
    </form>
    
    <div id="responseMessage" class="hidden"></div>

    <script>
        /* --- JS Logic for Toggling and Submission --- */
        
        // Function para tago/pakita ang tamang fields
        function toggleFormSections() {
            var appType = document.getElementById("appType").value;
            var expressSection = document.getElementById("expressSection");
            var premierSection = document.getElementById("premierSection");
            var offerCodeInput = document.getElementById("offerCode");

            if (appType === "Express Apply") {
                expressSection.classList.remove("hidden");
                premierSection.classList.add("hidden");
                offerCodeInput.setAttribute("required", ""); // Required kung Express
            } else {
                expressSection.classList.add("hidden");
                premierSection.classList.remove("hidden");
                offerCodeInput.removeAttribute("required"); // Hindi required kung Premier
            }
        }

        // Tawagin muna ito para tama ang default state
        toggleFormSections();

        // Submit Logic (Kabit sa Google Apps Script mo)
        document.getElementById("loanApplicationForm").addEventListener("submit", function(event) {
            event.preventDefault(); // Huwag muna mag-refresh
            
            var submitBtn = document.getElementById("submitBtn");
            var responseMessage = document.getElementById("responseMessage");
            submitBtn.disabled = true;
            submitBtn.innerText = "Processing...";
            responseMessage.classList.add("hidden");

            // Kuhanin ang data
            var formData = new FormData(event.target);
            var object = {};
            formData.forEach((value, key) => { object[key] = value });
            
            // Lagyan ng timestamp
            object["timestamp"] = new Date().toLocaleString();

            // *** DITO MO ILALAGAY ANG GOOGLE APPS SCRIPT WEB APP URL MO ***
            const webAppUrl = 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE';

            fetch(webAppUrl, {
                method: 'POST',
                mode: 'no-cors', // Important para sa cross-origin submission
                cache: 'no-cache',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(object)
            })
            .then(response => {
                // Dahil 'no-cors' ang gamit, mahirap malaman ang server response
                // kaya assume na natin na pumasok (mas mabilis din para sa customer)
                submitBtn.disabled = false;
                submitBtn.innerText = "Submit Application";
                responseMessage.innerText = "Aplikasyon matagumpay na natanggap! Ipo-proseso namin ito agad. Salamat!";
                responseMessage.className = "success";
                responseMessage.classList.remove("hidden");
                event.target.reset(); // I-clear ang form
                toggleFormSections(); // I-reset ang dynamic fields
            })
            .catch(error => {
                submitBtn.disabled = false;
                submitBtn.innerText = "Submit Application";
                responseMessage.innerText = "Pasensya na, nagkaroon ng error. Subukan muli.";
                responseMessage.className = "error";
                responseMessage.classList.remove("hidden");
                console.error('Error:', error);
            });
        });
    </script>
</body>
</html>
